name: Check Inactive Users

on:
  schedule:
    - cron: "0 21 * * *"    # Every Monday at 6:00 AM UTC
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  check-inactive:
    runs-on: ubuntu-latest

    env:
      STORAGE_URL: ${{ secrets.STORAGE_URL }}
      STORAGE_API_KEY: ${{ secrets.STORAGE_API_KEY }}
      BREVO_API: ${{ secrets.BREVO_API }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run inactivity check
        run: python api/util/emailing/active_emailing.py